<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="theme-color" content="#ff5733">

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    :root {
      --primary: #ff5733;
      --primary-hover: #e04422;
      --primary-light: #fff0eb;
      --success: #12a150;
      --success-light: #ecfdf5;
      --warning: #f59e0b;
      --warning-light: #fefbeb;
      --danger: #ef4444;
      --text-main: #0f172a;
      --text-muted: #64748b;
      --bg-main: #f8fafc;
      --bg-card: #ffffff;
      --border-light: #e2e8f0;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.05), 0 1px 2px rgba(0,0,0,0.02);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.05), 0 2px 4px -1px rgba(0,0,0,0.03);
      --shadow-lg: 0 10px 25px -5px rgba(0,0,0,0.08), 0 8px 10px -6px rgba(0,0,0,0.05);
      --transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      --font: 'Outfit', -apple-system, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: var(--font);
      background: #0f172a;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    .app-emulator-container {
      width: 100%;
      max-width: 450px;
      height: 100vh;
      background: var(--bg-main);
      position: relative;
      overflow: hidden;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      display: flex;
      flex-direction: column;
    }

    .desktop-bg-canvas {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at 10% 20%, rgba(255, 87, 51, 0.08) 0%, rgba(15, 23, 42, 0.95) 90%);
      z-index: -1;
      display: flex;
      justify-content: space-between;
      padding: 40px;
      box-sizing: border-box;
    }

    .desktop-info-card {
      color: white;
      max-width: 320px;
      display: none;
      flex-direction: column;
      justify-content: center;
    }

    .desktop-info-card h1 {
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 15px;
      background: linear-gradient(135deg, #ff5733, #ff8b70);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .desktop-info-card p {
      color: #94a3b8;
      font-size: 1.05rem;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .brand-feature-badge {
      background: rgba(255, 87, 51, 0.15);
      border: 1px solid rgba(255, 87, 51, 0.25);
      color: #ff8b70;
      padding: 8px 16px;
      border-radius: 99px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-weight: 600;
      margin-bottom: 20px;
      width: fit-content;
    }

    @media (min-width: 1025px) {
      .desktop-info-card {
        display: flex;
      }
      .app-emulator-container {
        height: 92vh;
        border-radius: 32px;
        border: 8px solid #334155;
      }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 99px;
    }

    h1, h2, h3, h4 {
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @keyframes slideLeft {
      from { transform: translateX(100%); }
      to { transform: translateX(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes pulse-soft {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 14px rgba(18, 161, 80, 0.4); }
      50% { transform: scale(1.03); box-shadow: 0 6px 20px rgba(18, 161, 80, 0.6); }
    }

    @keyframes pulse-primary {
      0%, 100% { transform: scale(1); box-shadow: 0 4px 14px rgba(255, 87, 51, 0.4); }
      50% { transform: scale(1.03); box-shadow: 0 6px 20px rgba(255, 87, 51, 0.6); }
    }

    .animate-fade-in {
      animation: fadeIn 0.3s ease-out forwards;
    }

    .animate-pulse-green {
      animation: pulse-soft 2s infinite;
    }

    .animate-pulse-coral {
      animation: pulse-primary 2s infinite;
    }

    input {
      outline: none;
      border: 1px solid var(--border-light);
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 0.95rem;
      background: var(--bg-card);
      color: var(--text-main);
      transition: var(--transition);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(255, 87, 51, 0.15);
    }

    .card-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      color: white;
      padding: 4px 10px;
      border-radius: 8px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      box-shadow: var(--shadow-sm);
      z-index: 10;
    }

    .card-badge.sale {
      background: #ff5733;
    }

    .card-badge.hire {
      background: #3b82f6;
    }

    .tab-active-indicator {
      position: absolute;
      bottom: 0;
      left: 15%;
      right: 15%;
      height: 3px;
      background: var(--primary);
      border-radius: 9px;
    }
  </style>
</head>
<body>

    const CATEGORIES = [
      { id: "all", name: "All Cars" },
      { id: "SUV", name: "SUVs" },

      { id: "Hatchback", name: "Hatchbacks" },

    function App() {
      const [activeTab, setActiveTab] = useState('home');
      const [selectedCar, setSelectedCar] = useState(null);
      const [cart, setCart] = useState([]);
      const [favorites, setFavorites] = useState([]);

      const [detailDays, setDetailDays] = useState(3);
      const [detailQuantity, setDetailQuantity] = useState(1);
      const [userEmail, setUserEmail] = useState('');
      const [loginInput, setLoginInput] = useState('');
      const [successToast, setSuccessToast] = useState('');

      useEffect(() => {
        // Initialize lucide icons
        setTimeout(() => {
          if (window.lucide) {
            window.lucide.createIcons();
          }
        }, 100);
      }, [activeTab, selectedCar]);

      const triggerToast = (msg) => {
        setSuccessToast(msg);
        setTimeout(() => setSuccessToast(''), 3000);
      };

      const toggleFavorite = (carId, e) => {
        if (e) e.stopPropagation();
        if (favorites.includes(carId)) {
          setFavorites(favorites.filter(id => id !== carId));
          triggerToast("Removed from Wishlist");
        } else {
          setFavorites([...favorites, carId]);
          triggerToast("Added to Wishlist!");
        }
      };

      const addToCart = (car, mode, qtyOrDays) => {
        const id = `${car.id}-${mode}`;
        const existingIndex = cart.findIndex(item => item.id === id);
        if (existingIndex > -1) {
          const newCart = [...cart];
          if (mode === 'hire') {
            newCart[existingIndex].days = qtyOrDays;
          } else {
            newCart[existingIndex].quantity += qtyOrDays;
          }
          setCart(newCart);
        } else {
          setCart([...cart, {
            id,
            car,
            mode,
            quantity: mode === 'buy' ? qtyOrDays : 1,
            days: mode === 'hire' ? qtyOrDays : 1
          }]);
        }
        triggerToast(`Added ${car.name} to enquiry!`);
      };

      const removeFromCart = (itemId) => {
        setCart(cart.filter(item => item.id !== itemId));
        triggerToast("Removed from cart");
      };

      const updateCartQuantity = (itemId, change) => {
        setCart(cart.map(item => {
          if (item.id === itemId) {
            if (item.mode === 'hire') {
              return { ...item, days: Math.max(1, item.days + change) };
            } else {
              return { ...item, quantity: Math.max(1, item.quantity + change) };
            }
          }
          return item;
        }));
      };

      const getFilteredCars = () => {
        return CAR_DATA.filter(car => {
          const matchesSearch = car.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                car.category.toLowerCase().includes(searchQuery.toLowerCase()) ||
                                car.specs.fuel.toLowerCase().includes(searchQuery.toLowerCase());
          
          if (selectedCategory === 'all') return matchesSearch;
          if (selectedCategory === 'Car Hire') return matchesSearch && car.isHire;
          return matchesSearch && car.category === selectedCategory;
        });
      };

      const getWhatsAppLink = (text) => {
        return `https://wa.me/256702370441?text=${encodeURIComponent(text)}`;
      };

      const generateSingleWhatsAppMessage = (car, mode, days, qty) => {
        let text = `Hello KieZcars! 👋\n\nI'm highly interested in the following vehicle:\n`;
        text += `🚗 *${car.name}*\n`;
        text += `• Category: ${car.category}\n`;
        text += `• Mode: ${mode === 'hire' ? 'Rental / Car Hire' : 'Outright Purchase'}\n`;
        
        if (mode === 'hire') {
          text += `• Duration: ${days} days\n`;
          text += `• Daily rate: $${car.priceHire}/day\n`;
          text += `• Subtotal: $${car.priceHire * days}\n`;
          text += `• Deposit: $200\n`;
          text += `*Grand Total: $${(car.priceHire * days) + 200}*`;
        } else {
          text += `• Quantity: ${qty} unit(s)\n`;
          text += `• Unit Price: $${car.priceSale.toLocaleString()}\n`;
          text += `*Grand Total: $${(car.priceSale * qty).toLocaleString()}*`;
        }
        text += `\n\nPlease confirm availability. Thank you!`;
        return getWhatsAppLink(text);
      };

      const generateCartWhatsAppMessage = () => {
        let text = `Hello KieZcars! 👋\n\nI'd like to submit an enquiry:\n\n`;
        let grandTotal = 0;
        
        cart.forEach((item, index) => {
          const car = item.car;
          text += `${index + 1}. *${car.name}* (${item.mode === 'hire' ? 'Hire' : 'Buy'})\n`;
          if (item.mode === 'hire') {
            const sub = car.priceHire * item.days;
            text += `   • $${car.priceHire}/d × ${item.days} days = $${sub}\n`;
            grandTotal += sub;
          } else {
            const sub = car.priceSale * item.quantity;
            text += `   • $${car.priceSale.toLocaleString()} × ${item.quantity} = $${sub.toLocaleString()}\n`;
            grandTotal += sub;
          }
        });
        
        text += `\n*Grand Total Estimate: $${(grandTotal + 200).toLocaleString()}* (incl. $200 deposit)\n\nPlease advise on next steps!`;
        return getWhatsAppLink(text);
      };

      const handleLogin = (e) => {
        e.preventDefault();
        if (loginInput.trim()) {
          setUserEmail(loginInput);
          triggerToast("Logged In!");
          setLoginInput('');

              </div>
              <div style={{ background: 'rgba(255,255,255,0.05)', padding: '12px', borderRadius: '16px', border: '1px solid rgba(255,255,255,0.1)', flex: 1 }}>
                <h4 style={{ color: '#ff5733', fontSize: '1.2rem', marginBottom: '4px' }}>100%</h4>

                  <div style={{ background: 'var(--primary)', color: 'white', padding: '6px', borderRadius: '10px', display: 'flex' }}>
                    <i data-lucide="car" style={{ width: '18px', height: '18px' }}></i>
                  </div>
                  <span style={{ fontWeight: '800', fontSize: '1.2rem' }}>KieZ<span style={{ color: 'var(--primary)' }}>cars</span></span>
                </div>

                  <button onClick={() => setActiveTab('favorites')} style={{ position: 'relative', background: 'transparent', border: 'none', cursor: 'pointer', color: '#64748b' }}>
                    <i data-lucide="heart" style={{ width: '22px', fill: favorites.length > 0 ? "var(--danger)" : "none", color: favorites.length > 0 ? "var(--danger)" : "#64748b" }}></i>
                    {favorites.length > 0 && <span style={{ position: 'absolute', top: -4, right: -4, background: 'var(--danger)', color: 'white', fontSize: '0.62rem', fontWeight: 'bold', padding: '1px 4px', borderRadius: '50%' }}>{favorites.length}</span>}
                  </button>
                  <button onClick={() => setActiveTab('cart')} style={{ position: 'relative', background: 'transparent', border: 'none', cursor: 'pointer', color: '#64748b' }}>
                    <i data-lucide="shopping-bag" style={{ width: '22px', color: cart.length > 0 ? "var(--primary)" : "#64748b" }}></i>
                    {cart.length > 0 && <span style={{ position: 'absolute', top: -4, right: -4, background: 'var(--primary)', color: 'white', fontSize: '0.62rem', fontWeight: 'bold', padding: '1px 4px', borderRadius: '50%' }}>{cart.length}</span>}

            {/* Toast */}

              <div style={{
                position: 'absolute', top: '75px', left: '50%', transform: 'translateX(-50%)',

                fontSize: '0.8rem', display: 'flex', alignItems: 'center', gap: '6px', zIndex: 99
              }}>
                <i data-lucide="check" style={{ width: '14px', color: '#10b981' }}></i>
                <span>{successToast}</span>
              </div>
